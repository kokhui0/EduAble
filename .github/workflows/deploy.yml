name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip application
        run: zip -r deploy.zip . -x "*.git*" -x "__pycache__/*" -x "*.DS_Store"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://${{ secrets.SAM_DEPLOY_BUCKET }}/deploy-${{ github.sha }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name eduable \
            --version-label v-${{ github.sha }} \
            --source-bundle S3Bucket=${{ secrets.SAM_DEPLOY_BUCKET }},S3Key=deploy-${{ github.sha }}.zip

          aws elasticbeanstalk update-environment \
            --environment-name eduable-env \
            --version-label v-${{ github.sha }}

      - name: Print live URL
        run: |
          echo "✅ App deployed! Check the Elastic Beanstalk console for your URL."
